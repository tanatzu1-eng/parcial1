<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS: -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../css/style.css">

    <!-- PESTANIA: -->
    <title>Parcial</title>

    <!-- FUENTES: -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Delicious+Handrawn&display=swap" rel="stylesheet">
    
    <!-- ICONOS: -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />

</head>



<body class="bg-slate-900 text-gray-50">

    <header class="bg-slate-700 grid grid-cols-7 items-center p-2 shadow-md shadow-black">

    <!-- logo -->
        <div class="size-10">
            <a href="index.html">
                <img
                src="../img/logo.webp"
                alt="logo de la pagina">
            </a>
        </div>

    <!-- navbar -->
        <div class="col-span-4 col-start-3">
            <input
            type="text"
            class="bg-slate-500 p-2 w-full texto text-2xl rounded-lg"
            id="buscador"
            placeholder="Buscar por nombre...">
        </div>

        <div class="p-2 text-3xl" id="boton_buscar">
            <a href="#">
                <span class="material-symbols-outlined">search</span>
            </a>
        </div>

    <!-- carrito de compras y perfil -->
        <div class="flex justify-self-end col-start-8">
            <a href="#">
                <img
                src="../img/carrito.webp"
                alt="logo carrito de compras"
                class="lg:mx-5 size-10">
            </a>

            <a
            id="icono-perfil"
            href="#">
                <img
                src="../img/user-icon.webp"
                alt="icono de usuario"
                class="size-10">
            </a>
        </div>

    </header>


    <script src="main.js"></script>
</body>
</html>
