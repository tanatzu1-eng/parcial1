<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS: -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../css/style.css">

    <!-- PESTANIA: -->
    <title>Parcial</title>

    <!-- FUENTES: -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Delicious+Handrawn&display=swap" rel="stylesheet">

</head>



<body class="bg-slate-900 text-gray-50">

    <header class="bg-slate-700 grid grid-cols-7 items-center p-2">

    <!-- logo -->
        <div class="
                lg:size-15
                md:size-15
                sm:size-15
                size-10">
            <a href="index.html">
                <img
                src="../img/logo.webp"
                alt="logo de la pagina">
            </a>
        </div>

    <!-- navbar -->
        <div class="col-span-4 col-start-3">
            <input
            type="text"
            class="bg-slate-500 p-2 w-full texto text-2xl"
            id="buscador"
            placeholder="Buscar...">
        </div>

    <!-- carrito de compras y perfil -->
        <div class="flex justify-self-end col-start-8">
            <a href="../html/carrito.html">
                <img
                src="../img/carrito.webp"
                alt="logo carrito de compras"
                class="
                    lg:size-15 lg:mx-5
                    md:size-15
                    sm:size-15
                    size-10">
            </a>

            <a
            id="icono-perfil"
            href="#">
                <img
                src="../img/user-icon.webp"
                alt="icono de usuario"
                class="
                    lg:size-15
                    md:size-15
                    sm:size-15
                    size-10">
            </a>
        </div>

    </header>



    <main>

        <h1 class="text-center pt-10 text-4xl titulo mt-10 mb-20">Titulo de la pagina</h1>



        <section class="grid grid-cols-11 grid-rows-4">

            <button
            id="boton-database-completa"
            onclick="ObtenerArticulos()"
            class="
                bg-red-900 p-5 texto m-2 text-2xl shadow-xl shadow-black
                hover:bg-red-800 hover:shadow-2xl

                col-start-5 col-span-3 row-start-1 row-span-2
                lg:text-4xl lg:col-start-2 lg:col-span-2 lg:row-start-2
                md:col-start-5 md:col-span-3 md:text-5xl
                sm:col-start-5 sm:col-span-3 sm:text-4xl">
            obtener database</button>

            <div
            id="contenedor-database-completa"
            class="bg-slate-800

            col-start-2 col-span-9 row-span-2
            lg:col-start-5 lg:col-span-6 lg:row-start-1 lg:row-span-4
            md:row-start-3 md:row-span-2
            sm:"></div>

        </section>
    </main>

    <script src="../js/main.js"></script>
</body>
</html>
