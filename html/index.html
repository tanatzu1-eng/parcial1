<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS: -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../css/style.css">

    <!-- PESTANIA: -->
    <title>Parcial</title>

    <!-- FUENTES: -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Delicious+Handrawn&display=swap" rel="stylesheet">

    <!-- ICONOS: -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />

</head>



<body class="bg-slate-900 text-gray-50">

    <header class="bg-slate-800 grid grid-cols-7 items-center p-2 mb-10 shadow-md shadow-black">

    <!-- logo -->
        <div class="size-10">
            <a href="index.html">
                <img
                src="../img/logo.webp"
                alt="logo de la pagina">
            </a>
        </div>

    <!-- navbar -->
        <div class="col-span-4 col-start-3">
            <input
            type="text"
            class="bg-slate-500 p-2 w-full texto text-2xl rounded-lg"
            id="buscador"
            placeholder="Buscar o borrar por Id...">
        </div>

        <div
            class="p-2 text-3xl"
            id="boton_buscar">
            <a href="#">
                <span class="material-symbols-outlined">search</span>
            </a>
        </div>

    <!-- carrito de compras y perfil -->
        <div class="flex justify-self-end col-start-8">
            <a href="../html/carrito.html">
                <img
                src="../img/carrito.webp"
                alt="logo carrito de compras"
                class="lg:mx-5 size-10">
            </a>

            <a
            id="icono-perfil"
            href="#">
                <img
                src="../img/user-icon.webp"
                alt="icono de usuario"
                class="size-10">
            </a>
        </div>

    </header>



    <main class="mb-10">

        <section class="grid grid-cols-12 grid-rows-5 gap-2 mb-10
                    sm:ml-5 sm:grid-rows-3">

            <input
                id="id_item"
                type="text"
                placeholder="Id..."
                class="
                    bg-slate-700 rounded p-2
                    
                    col-start-2 col-span-5
                    sm:col-start-1 sm:col-span-3">

            <input
                id="titulo_item"
                type="text"
                placeholder="Titulo..."
                class="
                    bg-slate-700 rounded p-2

                    col-start-7 col-span-5
                    sm:col-start-4 sm:col-span-3">

            <select
                id="disponible_item"
                class="
                    bg-slate-700 rounded p-2

                    col-start-2 col-span-5
                    sm:col-start-1 sm:col-span-3">
                <option value="true">Disponible</option>
                <option value="false">No disponible</option>
            </select>

            <input
                id="precio_item"
                type="text"
                placeholder="Precio..."
                class="
                    bg-slate-700 rounded p-2
                    
                    col-start-7 col-span-5
                    sm:col-start-4 sm:col-span-3 sm:row-span-1">

            <textarea
                id="descripcion_item"
                type="text"
                placeholder="Descripcion..."
                class="
                    bg-slate-700 rounded p-2
                    
                    col-start-2 col-span-10 row-span-3
                    sm:col-start-1 sm:col-span-6 sm:row-span-2"
            ></textarea>



            <button
                id="boton_database_completa"
                class="
                    bg-red-900 texto p-2 m-1 text-lg shadow-xl shadow-black rounded-lg
                    hover:bg-red-800 hover:shadow-2xl

                    col-start-1 col-span-3 ml-5
                    sm:text-2xl sm:col-start-7 sm:row-start-1"
            >obtener database</button>
                    
            <button
                id="boton_post"
                class="
                    bg-red-900 texto p-2 m-1 text-lg shadow-xl shadow-black rounded-lg
                    hover:bg-red-800 hover:shadow-2xl

                    col-start-4 col-span-3
                    sm:text-2xl sm:col-start-10 sm:row-start-1 sm:mr-5"
            >postear item</button>
                    
            <button
                id="boton_put"
                class="
                    bg-red-900 texto p-2 m-1 text-lg shadow-xl shadow-black rounded-lg
                    hover:bg-red-800 hover:shadow-2xl

                    col-start-7 col-span-3
                    sm:text-2xl sm:col-start-7 sm:row-start-2 sm:ml-5"
            >modificar item</button>
                    
            <button
                id="boton_delete"
                class="
                    bg-red-900 p-2 texto m-1 text-lg shadow-xl shadow-black rounded-lg py-8
                    hover:bg-red-800 hover:shadow-2xl

                    col-start-10 col-span-3 mr-5
                    sm:text-2xl sm:col-start-10 sm:row-start-2 sm:py-10"
            >borrar item</button>
                    
        </section>



        <section class="grid grid-cols-12">

            <div
                id="contenedor_resultados"
                class="
                    bg-slate-800 p-2 rounded-lg

                    col-start-2 col-span-10
                    lg:col-start-5 lg:col-span-6 lg:row-start-1 lg:row-span-4
                    md:row-start-3 md:row-span-2
                    sm:row-start-1">
            </div>

        </section>

    </main>

    <script src="../js/main.js"></script>
</body>
</html>
